<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopSphere</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header, footer {
    background:#1e88e5; color:white; text-align:center; padding:15px;
}

nav { background:#1565c0; padding:10px; text-align:center; }
nav a { color:white; margin:10px; text-decoration:none; }

section { padding:20px; }

.products { display:flex; gap:20px; flex-wrap:wrap; }

.card {
    background:white; padding:15px; border-radius:10px;
    width:200px; text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button {
    background:#1e88e5; color:white; border:none;
    padding:8px 12px; cursor:pointer; border-radius:5px;
}

form {
    background:white; padding:15px; border-radius:10px;
    max-width:400px; margin-top:10px;
}

input, textarea, select {
    width:100%; margin:8px 0; padding:8px;
}

.hidden { display:none; }

#cart { background:white; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<header>
    <h1>🛒 ShopSphere</h1>
</header>

<nav>
    <a href="#products">Products</a>
    <a href="#cartSection">Cart</a>
    <a href="#payment">Payment</a>
</nav>

<!-- PRODUCTS -->
<section id="products">
<h2>Products</h2>

<div class="products">
    <div class="card">
        <h3>Smartphone</h3>
        <p>₹20000</p>
        <button onclick="addToCart('Smartphone',20000)">Add</button>
    </div>

    <div class="card">
        <h3>Laptop</h3>
        <p>₹50000</p>
        <button onclick="addToCart('Laptop',50000)">Add</button>
    </div>

    <div class="card">
        <h3>Headphones</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Headphones',2000)">Add</button>
    </div>
</div>
</section>

<!-- CART -->
<section id="cartSection">
<h2>🛍️ Cart</h2>
<div id="cart"></div>
<p><strong>Total: ₹<span id="total">0</span></strong></p>
<button onclick="goToPayment()">Proceed to Payment</button>
</section>

<!-- PAYMENT -->
<section id="payment" class="hidden">
<h2>💳 Payment Page</h2>

<form onsubmit="processPayment(event)">
    <input type="text" placeholder="Card Holder Name" required>
    <input type="text" placeholder="Card Number" required>
    <input type="text" placeholder="Expiry (MM/YY)" required>
    <input type="text" placeholder="CVV" required>

    <select required>
        <option value="">Select Payment Method</option>
        <option>Credit Card</option>
        <option>Debit Card</option>
        <option>UPI</option>
    </select>

    <button type="submit">Pay Now</button>
</form>
</section>

<!-- SUCCESS -->
<section id="success" class="hidden">
<h2>✅ Payment Successful!</h2>
<p>Your order has been placed.</p>
</section>

<footer>
<p>© 2026 ShopSphere</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    let cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    cart.forEach(item => {
        let p = document.createElement("p");
        p.innerText = item.name + " - ₹" + item.price;
        cartDiv.appendChild(p);
    });

    document.getElementById("total").innerText = total;
}

function goToPayment() {
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }
    document.getElementById("payment").classList.remove("hidden");
    window.location.hash = "payment";
}

function processPayment(e) {
    e.preventDefault();

    console.log("Payment Done. Amount:", total);

    document.getElementById("payment").classList.add("hidden");
    document.getElementById("success").classList.remove("hidden");

    cart = [];
    total = 0;
    updateCart();
}
</script>

</body>
</html>
